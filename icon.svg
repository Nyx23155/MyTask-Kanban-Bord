<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">
  <defs>
    <!-- Тень для создания объема и наслаивания карточек друг на друга -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#172B4D" flood-opacity="0.3"/>
    </filter>
    
    <!-- Мягкая тень под самой иконкой -->
    <filter id="bgShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0052CC" flood-opacity="0.2"/>
    </filter>
    
    <!-- Легкий градиент для белого фона (эффект качественного пластика) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E4E9"/>
    </linearGradient>
  </defs>

  <!-- Основа иконки (белый скругленный квадрат) -->
  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#bg)" filter="url(#bgShadow)"/>

  <!-- Монограмма "М", состоящая из четырех цветных канбан-карточек -->
  <g stroke-width="34" stroke-linecap="round" filter="url(#shadow)">
    <!-- Правая диагональ (Зеленая карточка) -->
    <line x1="188" y1="80" x2="128" y2="164" stroke="#00875A"/>
    <!-- Левая диагональ (Оранжевая карточка) -->
    <line x1="68" y1="80" x2="128" y2="164" stroke="#FF8B00"/>
    <!-- Правая вертикальная (Фиолетовая карточка) -->
    <line x1="188" y1="80" x2="188" y2="176" stroke="#6554C0"/>
    <!-- Левая вертикальная (Синяя карточка) -->
    <line x1="68" y1="80" x2="68" y2="176" stroke="#0052CC"/>
  </g>
</svg>
